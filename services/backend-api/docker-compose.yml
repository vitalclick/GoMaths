services:
  postgres:
    image: postgres:16-alpine
    container_name: gomaths-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gomaths
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: gomaths
    ports:
      - "5432:5432"
    volumes:
      - gomaths-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gomaths"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gomaths-pgdata:
