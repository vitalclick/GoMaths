# Fly config for the FastAPI validation service.
#
#   fly launch -c fly.validation.toml --copy-config --no-deploy
#   fly deploy -c fly.validation.toml --build-arg SERVICE=validation
#
# No secrets — the validator is pure SymPy.

app = "gomaths-ai-validation"
primary_region = "jnb"

[build]
  dockerfile = "services/ai-services/Dockerfile"
  [build.args]
    SERVICE = "validation"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # The validator is invoked by the backend on every tutor reply that
  # contains a maths claim. Keeping it warm avoids streaming stutter.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
