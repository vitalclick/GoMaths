name: Deploy to Fly.io

# Deploys the four Fly apps (backend + three AI services) from the
# repo's root fly.*.toml files. AI services share a Dockerfile and are
# differentiated by the SERVICE build-arg in each toml.
#
# Triggers:
#   - workflow_dispatch: manual run from the Actions tab, with a
#     "service" choice so you can redeploy one app at a time without
#     re-rolling the others.
#   - push to main: deploys everything that changed. Path filters keep
#     unrelated commits (docs, curriculum) from triggering a deploy.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   FLY_API_TOKEN — `fly tokens create deploy` from a Fly admin account
#     scoped to the four apps (gomaths-backend, gomaths-ai-tutor,
#     gomaths-ai-solver, gomaths-ai-validation).
#
# App-level secrets (DATABASE_URL, ANTHROPIC_API_KEY, JWT_* etc.) are
# set on each Fly app via `fly secrets set` — see the comments at the
# top of each fly.*.toml. The workflow does not manage those.

on:
  push:
    branches: [main]
    paths:
      - "fly.*.toml"
      - "services/backend-api/**"
      - "services/ai-services/**"
      - ".github/workflows/deploy-fly.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - tutor
          - solver
          - validation

concurrency:
  group: deploy-fly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend:
    name: Deploy backend (NestJS)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'backend'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy backend
        run: flyctl deploy --remote-only -c fly.backend.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  tutor:
    name: Deploy tutor (FastAPI)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'tutor'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy tutor
        run: flyctl deploy --remote-only -c fly.tutor.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  solver:
    name: Deploy solver (FastAPI)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'solver'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy solver
        run: flyctl deploy --remote-only -c fly.solver.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  validation:
    name: Deploy validation (FastAPI + SymPy)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'validation'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy validation
        run: flyctl deploy --remote-only -c fly.validation.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
