name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python:
    name: Python — ai-services tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install the test dependencies directly rather than `pip install -e .`
      # (the latter would also need a hatch packages config). pytest picks up
      # `tutor/`, `solver/`, `validation/` via sys.path when run from the
      # service root.
      - name: Install dependencies
        working-directory: services/ai-services
        run: |
          python -m pip install --upgrade pip
          pip install sympy fastapi 'uvicorn[standard]' pydantic anthropic openai pytest pytest-asyncio

      - name: Run all ai-services tests
        working-directory: services/ai-services
        run: pytest -v

  curriculum:
    name: Curriculum — answer validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sympy
        run: pip install sympy

      - name: Validate every authored answer
        run: python curriculum-data/scripts/validate_curriculum.py

  node:
    name: Node — install + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # No `pnpm-lock.yaml` is committed yet — first install on a dev machine
      # creates one; CI will lock to it once committed. Until then we run
      # without --frozen-lockfile.
      - run: pnpm install

      - run: pnpm format:check
        continue-on-error: true

      # Typecheck + lint + codegen verification run across the monorepo
      # depend on every transitive dep resolving cleanly and on a real
      # `packages/api-client/src/generated.ts` having been committed
      # (today it's a stub — see packages/api-client/README.md). They're
      # informational on this PR; flip continue-on-error off in the
      # follow-up that commits the lockfile.
      - run: pnpm turbo run typecheck
        continue-on-error: true
      - run: pnpm turbo run lint
        continue-on-error: true
      - name: Regenerate API client + check it's committed
        continue-on-error: true
        run: |
          pnpm --filter @gomaths/api-client generate
          if ! git diff --quiet -- packages/api-client/src/generated.ts; then
            echo "::warning::packages/api-client/src/generated.ts is stale — run pnpm --filter @gomaths/api-client generate and commit."
          fi

  # The Playwright E2E suite needs a working monorepo install + an Expo Web
  # build that actually boots in CI. Both are gated on the first lockfile
  # commit. Keeping the job in the workflow (not deleted) so the runbook is
  # discoverable; switch `if:` to `${{ true }}` once unblocked.
  e2e:
    name: E2E — Student app (Playwright on web)
    runs-on: ubuntu-latest
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install
      - name: Install Playwright browsers
        run: pnpm --filter @gomaths/e2e exec playwright install --with-deps chromium
      - name: Run Playwright suite
        run: pnpm --filter @gomaths/e2e test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
