name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python:
    name: Python — ai-services tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/ai-services
        run: |
          python -m pip install --upgrade pip
          pip install sympy fastapi 'uvicorn[standard]' pydantic anthropic openai pytest pytest-asyncio

      - name: Run all ai-services tests
        working-directory: services/ai-services
        run: pytest -v

  curriculum:
    name: Curriculum — answer validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sympy
        run: pip install sympy

      - name: Validate every authored answer
        run: python curriculum-data/scripts/validate_curriculum.py

  node:
    name: Node — typecheck, format, codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @gomaths/backend-api prisma:generate

      - name: Regenerate API client and check no drift
        run: |
          pnpm --filter @gomaths/api-client generate
          if ! git diff --quiet -- packages/api-client/src/generated.ts; then
            echo "::error::packages/api-client/src/generated.ts is out of sync with openapi.yaml — run 'pnpm --filter @gomaths/api-client generate' and commit"
            git --no-pager diff -- packages/api-client/src/generated.ts | head -40
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

  e2e:
    name: E2E — Student app (Playwright on web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @gomaths/e2e exec playwright install --with-deps chromium
      - name: Run Playwright suite
        run: pnpm --filter @gomaths/e2e test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
