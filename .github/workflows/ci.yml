name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python:
    name: Python — ai-services tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install the test dependencies directly rather than `pip install -e .`
      # (the latter would also need a hatch packages config). pytest picks up
      # `tutor/`, `solver/`, `validation/` via sys.path when run from the
      # service root.
      - name: Install dependencies
        working-directory: services/ai-services
        run: |
          python -m pip install --upgrade pip
          pip install sympy fastapi 'uvicorn[standard]' pydantic anthropic openai pytest pytest-asyncio

      - name: Run all ai-services tests
        working-directory: services/ai-services
        run: pytest -v

  curriculum:
    name: Curriculum — answer validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sympy
        run: pip install sympy

      - name: Validate every authored answer
        run: python curriculum-data/scripts/validate_curriculum.py

  node:
    name: Node — package.json sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # Without a committed pnpm-lock.yaml we can't make `pnpm install`
      # reliable in CI (every transitive dep version is unconstrained).
      # Until the first real install happens on a dev machine and the
      # lockfile is committed, the Node job verifies what it can: every
      # package.json parses as valid JSON.
      - name: Validate every package.json
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"; then
              echo "::error file=$f::invalid JSON"
              fail=1
            fi
          done < <(find . -name package.json -not -path '*/node_modules/*' -not -path './UI/*')
          exit $fail

      # Informational install + format/typecheck — runs after the lockfile
      # lands. Until then they're scoped out so the PR doesn't show red.
      - name: pnpm install (informational, will run once lockfile is committed)
        if: ${{ false }}
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

  # The Playwright E2E suite needs a working monorepo install + an Expo Web
  # build that actually boots in CI. Both are gated on the first lockfile
  # commit. Keeping the job in the workflow (not deleted) so the runbook is
  # discoverable; switch `if:` to `${{ true }}` once unblocked.
  e2e:
    name: E2E — Student app (Playwright on web)
    runs-on: ubuntu-latest
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install
      - name: Install Playwright browsers
        run: pnpm --filter @gomaths/e2e exec playwright install --with-deps chromium
      - name: Run Playwright suite
        run: pnpm --filter @gomaths/e2e test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
